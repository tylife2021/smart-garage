workflows:

  # ==============================
  # Android Build (APK)
  # ==============================
  android-workflow:
    name: Android Release Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Analyze code
        script: flutter analyze --no-fatal-infos
      - name: Run tests
        script: flutter test
      - name: Build APK (release)
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - tylife2021@gmail.com
        notify:
          success: true
          failure: true

  # ==============================
  # iOS Build (no code sign)
  # ==============================
  ios-workflow:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Analyze code
        script: flutter analyze --no-fatal-infos
      - name: Build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app
    publishing:
      email:
        recipients:
          - tylife2021@gmail.com
        notify:
          success: true
          failure: true
