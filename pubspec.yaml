name: esp32_smart_controller
description: SmartGarage — Flutter app for ESP32 smart garage control.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # HTTP client
  dio: ^5.7.0

  # Charts
  fl_chart: ^0.68.0

  # Date/time formatting
  intl: ^0.19.0

  # Local storage
  shared_preferences: ^2.3.2

  # WebSocket
  web_socket_channel: ^3.0.1

  # MQTT
  mqtt_client: ^10.2.1

  # Network info
  connectivity_plus: ^6.1.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
